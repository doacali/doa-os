<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doa | AI OS</title>
  <style>
    body { margin:0; font-family:sans-serif; height:100vh; display:flex; background:#fff; }
    #main-sidebar { width: 260px; border-right: 1px solid #eee; padding: 20px; display: flex; flex-direction: column; }
    .nav-btn { padding: 15px; cursor: pointer; text-align: left; border-radius: 10px; margin-bottom: 5px; }
    .active { background: #000; color: #fff; }
    #main-content { flex: 1; display: flex; flex-direction: column; }
    .view { display: none; flex: 1; flex-direction: column; padding: 20px; }
    #chat-view { display: flex; }
  </style>
</head>
<body>
  <aside id="main-sidebar">
    <h1>DOA CALI</h1>
    <button class="nav-btn active" onclick="switchView('chat')">💬 Chat</button>
    <button class="nav-btn" onclick="switchView('calendar')">📅 Calendar</button>
    <button class="nav-btn" onclick="switchView('game')">👻 Ghost Buster</button>
  </aside>

  <main id="main-content">
    <div id="chat-view" class="view">
        <div id="chat-history" style="flex:1; overflow-y:auto;"></div>
        <input type="text" id="user-input" placeholder="Type here...">
        <button onclick="handleMessage()">Send</button>
    </div>
    <div id="calendar-view" class="view"><h1>Calendar</h1></div>
    <div id="game-view" class="view" style="background:#000;"><canvas id="game-canvas"></canvas></div>
  </main>

  <script>
    // NAVIGATION
    function switchView(view) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(view + '-view').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`button[onclick="switchView('${view}')"]`).classList.add('active');
        if(view === 'game') initGame();
    }

    // CHAT
    function handleMessage() {
        const input = document.getElementById('user-input');
        const h = document.getElementById('chat-history');
        h.innerHTML += `<div style="padding:10px; background:#000; color:#fff; margin:5px;">${input.value}</div>`;
        setTimeout(() => {
            h.innerHTML += `<div style="padding:10px; background:#eee; margin:5px;">I'm feeling steady. How's the mission?</div>`;
        }, 500);
        input.value = "";
    }

    // GAME
    function initGame() {
        const c = document.getElementById('game-canvas'), ctx = c.getContext('2d');
        c.width=600; c.height=400;
        let x=0; function loop(){ ctx.clearRect(0,0,c.width,c.height); ctx.fillText("👻", x, 100); x+=2; requestAnimationFrame(loop); }
        loop();
    }
  </script>
</body>
</html>
