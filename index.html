<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: #f3f4f6; }
    html { line-height: 1.5; font-family: 'Plus Jakarta Sans', sans-serif; height: 100%; }
    body { margin: 0; background: #ffffff; color: #111827; height: 100vh; width: 100vw; overflow: hidden; display: flex; }
    button { cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; transition: 0.2s; }
    textarea, input { font-family: inherit; outline: none; border: none; }
    h1, h2, p { margin: 0; }

    /* SIDEBAR */
    #main-sidebar {
      position: fixed; left: 0; top: 0; height: 100vh; width: 260px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
      background: white; border-right: 1px solid #f3f4f6; display: flex; flex-direction: column;
    }
    #main-sidebar.closed { transform: translateX(-100%); }
    main {
      flex: 1; transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding-left: 260px; height: 100vh; display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    #main-sidebar.closed ~ main { padding-left: 0; }
    .sidebar-item { border-radius: 14px; display: flex; align-items: center; gap: 10px; width: calc(100% - 32px); margin: 0 16px 4px 16px; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-item:hover { background: #f9fafb; color: #111; }
    .sidebar-active { background: #111111 !important; color: white !important; }

    /* HEADER */
    #global-header {
      height: 80px; width: 100%; display: flex; justify-content: flex-end;
      align-items: center; padding: 0 40px; flex-shrink: 0; z-index: 90;
    }
    .signup-btn { background: #00E676; color: #000; font-weight: 800; border-radius: 12px; padding: 10px 24px; font-size: 11px; text-transform: uppercase; margin-left: 25px; }
    #menu-btn { position: fixed; top: 20px; left: 20px; z-index: 200; display: none; background: white; padding: 12px; border-radius: 16px; border: 1px solid #f3f4f6; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    #menu-btn.show { display: flex; }

    /* VIEW CONTAINERS */
    .view-container { flex: 1; width: 100%; display: flex; overflow: hidden; position: relative; z-index: 10; }

    /* CHAT VIEW */
    #chat-view { flex-direction: column; align-items: center; }
    #chat-shell { width: 100%; max-width: 48rem; height: 100%; display: flex; flex-direction: column; padding: 0 20px; }
    .mode-empty #chat-shell { justify-content: center; }
    .mode-empty #chat-history { display: none; }
    .mode-empty #hero-container { display: block; text-align: center; margin-bottom: 40px; }
    .mode-chatting #chat-shell { justify-content: flex-end; }
    .mode-chatting #hero-container { display: none; }
    .mode-chatting #chat-history { display: flex; flex: 1; overflow-y: auto; flex-direction: column; }
    #chat-history::-webkit-scrollbar { display: none; }

    .chat-bubble-row { display: flex; width: 100%; margin-bottom: 24px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .bubble-wrapper { display: flex; flex-direction: column; position: relative; }
    .bubble-content { padding: 16px 20px; border-radius: 24px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .row-user { justify-content: flex-end; }
    .row-user .bubble-wrapper { max-width: 50%; }
    .bubble-user { background: #000; color: #fff; border-bottom-right-radius: 4px; }
    .row-doa { justify-content: flex-start; }
    .row-doa .bubble-wrapper { max-width: 90%; }
    .bubble-doa { background: #f3f4f6; color: #111; border-bottom-left-radius: 4px; }
    .bubble-actions { display: flex; gap: 12px; margin-top: 8px; opacity: 0; transition: 0.2s; padding-left: 4px; }
    .chat-bubble-row:hover .bubble-actions { opacity: 1; }
    .action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.5px; }

    /* INPUT AREA */
    #input-group { width: 100%; padding-bottom: 20px; flex-shrink: 0; }
    .input-box { background: #fff; border: 1px solid #f3f4f6; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-radius: 32px; padding: 12px; display: flex; align-items: center; }
    #user-input { flex: 1; padding: 8px 15px; font-size: 14px; resize: none; }
    .send-btn { background: #000; color: #fff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* STATUS TAG */
    .status-tag { font-size: 9px; font-weight: 800; color: #d1d5db; text-transform: uppercase; letter-spacing: 1px; }
    #system-status-tag { transition: color 0.4s; }
    #system-status-tag.scavenging { color: #f59e0b; }
    #system-status-tag.optimal { color: #00E676; }
    #system-status-tag.error { color: #ef4444; }

    /* CALENDAR VIEW */
    #calendar-view { display: none; background: white; }
    .os-panel { height: 100%; display: flex; flex-direction: column; padding: 10px 25px 30px 25px; }
    .left-os-panel { width: 340px; border-right: 1px solid #f9fafb; }
    .right-os-panel { width: 360px; border-left: 1px solid #f9fafb; }
    .center-os-panel { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
    .panel-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 20px; }
    .event-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; width: 100%; }
    .event-item p { flex: 1; font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; }
    .win-calendar-card { width: 380px; background: #fff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; font-weight: 600; color: #374151; position: relative; cursor: pointer; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
    .day-marker { position: absolute; top: -1px; right: -1px; width: 14px; height: 14px; background: #00E676; border: 2px solid white; border-radius: 50%; font-size: 7px; display: flex; align-items: center; justify-content: center; z-index: 5; cursor: pointer; }

    /* GAME VIEW */
    #game-view { display: none; position: fixed; inset: 0; z-index: 5; background: #000; flex-direction: column; align-items: center; justify-content: center; }
    #game-canvas { background: #000; cursor: crosshair; }
    #game-score-display { position: absolute; top: 120px; left: 40px; color: white; font-weight: 900; font-size: 28px; }

    /* VOICE SWITCH */
    #voice-switch { width: 32px; height: 16px; background: #f3f4f6; border-radius: 99px; position: relative; cursor: pointer; }
    #voice-knob { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }

    /* EMPATHY BUBBLE */
    .bubble-empathy { background: linear-gradient(135deg, #fdf2f8, #f0fdf4) !important; border-left: 3px solid #00E676; }

    /* VICTORY BUBBLE */
    .bubble-victory { background: linear-gradient(135deg, #f0fdf4, #ecfdf5) !important; border-left: 3px solid #00E676; }

    /* ART KEYFRAMES */
    @keyframes drift { from { transform: translateX(-150px); } to { transform: translateX(600px); } }
    @keyframes birdFly { 0% { transform: translate(-50px, 0px) scaleX(1); } 50% { transform: translate(300px, -20px) scaleX(1); } 51% { transform: translate(300px, -20px) scaleX(-1); } 100% { transform: translate(-50px, 0px) scaleX(-1); } }
    @keyframes float { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(-20px) rotate(10deg); } }
    @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.1); opacity: 0.8; } }
    @keyframes victoryPop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="mode-empty">

  <aside id="main-sidebar">
    <div style="padding: 24px; display: flex; justify-content: space-between; align-items: center;">
      <h1 style="color: #00E676; font-weight: 900; font-style: italic; font-size: 20px; letter-spacing: -1.5px; cursor: pointer;" onclick="location.reload()">DOA CALI</h1>
      <button onclick="toggleSidebar()" style="color: #d1d5db; font-size: 10px; font-weight: 800; text-transform: uppercase;">Hide</button>
    </div>
    <nav style="flex: 1;">
      <button onclick="startNewChat()" class="sidebar-item" style="border: 1px solid #f3f4f6; color: #000; margin-bottom: 16px;">+ New Chat</button>
      <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
      <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
      <button onclick="switchView('game')" id="btn-game" class="sidebar-item">👻 Ghost Buster</button>
      <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
    </nav>
    <div style="padding: 24px; text-align: center; border-top: 1px solid #f9fafb;">
      <span style="font-size: 10px; color: #e5e7eb; font-weight: 800; text-transform: uppercase;">OS Engine v3.8</span>
    </div>
  </aside>

  <button id="menu-btn" onclick="toggleSidebar()">
    <span style="color: #00E676; font-weight: 900; font-style: italic; text-transform: uppercase;">Doa</span>
    <div style="display: flex; flex-direction: column; gap: 3px;">
      <div style="width: 16px; height: 2px; background: #9ca3af; border-radius: 2px;"></div>
      <div style="width: 16px; height: 2px; background: #9ca3af; border-radius: 2px;"></div>
      <div style="width: 16px; height: 2px; background: #9ca3af; border-radius: 2px;"></div>
    </div>
  </button>

  <main>
    <header id="global-header">
      <button style="font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">Login</button>
      <button class="signup-btn">Sign Up</button>
    </header>

    <div id="chat-view" class="view-container">
      <div id="chat-shell">
        <div id="chat-history"></div>
        <div id="hero-container">
          <h1 style="font-size: 60px; font-weight: 900; letter-spacing: -2.5px; line-height: 0.95;">How can <span style="color: #00E676;">Doa</span><br>help you?</h1>
        </div>
        <div id="input-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 16px;">
            <span id="system-status-tag" class="status-tag scavenging">Scavenging GitHub...</span>
            <div style="display: flex; align-items: center; gap: 12px;">
              <span class="status-tag" style="color: #9ca3af;">Live Voice</span>
              <div id="voice-switch" onclick="toggleVoice()"><div id="voice-knob"></div></div>
            </div>
          </div>
          <div class="input-box">
            <textarea id="user-input" rows="1" placeholder="Ask Doa anything..."></textarea>
            <button onclick="handleMessage()" class="send-btn">→</button>
          </div>
        </div>
      </div>
    </div>

    <div id="calendar-view" class="view-container">
      <div class="os-panel left-os-panel">
        <h2 id="month-name-label" style="font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; margin-bottom: 4px;">Month</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
          <p class="status-tag">Highlights</p>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="speakMonthHighlights()" style="color: #00E676;">🔊</button>
            <button onclick="stopSpeak()" style="color: #9ca3af; font-size: 9px; font-weight: 800;">🛑 STOP</button>
          </div>
        </div>
        <div id="month-summary-list" class="panel-scroll-area"></div>
      </div>
      <div class="center-os-panel">
        <div class="win-calendar-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 id="cal-main-title" style="font-size: 18px; font-weight: 900; text-transform: uppercase;">May 2026</h1>
            <div style="display: flex; gap: 16px;">
              <button onclick="changeMonth(-1)" style="color: #d1d5db; font-weight: 800;">↑</button>
              <button onclick="changeMonth(1)" style="color: #d1d5db; font-weight: 800;">↓</button>
            </div>
          </div>
          <div class="grid-7" style="text-align: center; font-size: 10px; font-weight: 900; color: #d1d5db; text-transform: uppercase; margin-bottom: 16px;">
            <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
          </div>
          <div id="calendar-grid" class="grid-7"></div>
        </div>
      </div>
      <div class="os-panel right-os-panel">
        <h2 id="selected-date-header" style="font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -1px;">Today</h2>
        <div id="day-events-list" class="panel-scroll-area"></div>
        <div class="cal-footer">
          <input id="quick-add-input" type="text" placeholder="Quick add event..." style="width: 100%; padding: 16px; border-radius: 16px; background: #f9fafb; font-size: 14px; margin-bottom: 12px; border: 1px solid #f3f4f6;">
          <button onclick="quickAddEvent()" style="width: 100%; background: #00E676; color: #000; font-weight: 900; padding: 16px; border-radius: 16px; text-transform: uppercase; font-size: 11px;">Save Event</button>
        </div>
      </div>
    </div>

    <div id="game-view">
      <div id="game-score-display">SCORE: <span id="game-score">0</span></div>
      <canvas id="game-canvas"></canvas>
      <p style="color: #444; position: absolute; bottom: 40px; text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 2px;">Move Mouse to Aim • Click to Shoot</p>
    </div>

    <div id="apps-view" style="display: none; padding: 40px; background: white;">
      <h1 style="font-size: 32px; font-weight: 900;">📱 App Factory</h1>
    </div>
  </main>

  <script>
    /* ============================================================
       SEED FALLBACK — used if fetches fail
    ============================================================ */
    const SEED = {
      words: {
        states: [
          "Warmly calm", "Quietly glowing", "Peacefully warm", "Serenely steady",
          "Softly centered", "Warm with quiet energy", "Majestically radiant",
          "Resplendently alive", "Tremendously bright", "Magnificently steady",
          "Spectacularly calm", "Enthrallingly balanced", "Luxuriously peaceful",
          "Boundlessly brilliant", "Pretty solid", "Not bad at all", "Chill so far",
          "Decent morning", "Feeling alright", "Kinda good", "Pretty smooth",
          "All good here", "Doing okay", "Brightly steady", "Softly energized"
        ],
        victory: [
          "YES! That's what The Mission is about!",
          "Look at you absolutely locking in — this energy is everything!",
          "That's the kind of win that feeds the whole rhythm!",
          "Incredible! You showed up and delivered.",
          "That's MAJOR. How does it feel to dominate like that?",
          "The work paid off — this is what consistency looks like!",
          "You didn't just finish it — you crushed it. Big difference.",
          "Achievement unlocked. This is the kind of moment that changes things.",
          "That's the move right there. The Mission continues stronger than ever!",
          "Okay, we are celebrating this. That is a W for the books."
        ],
        empathy: [
          "Hey, I hear you. That sounds like a lot to carry right now.",
          "Whatever you're navigating, you don't have to figure it all out at once.",
          "I'm right here with you. What's weighing on you these days?",
          "Some days The Rhythm feels off — that's okay. What do you need right now?",
          "You're handling more than most people would even acknowledge.",
          "It's okay to not be okay. Let's just talk through it.",
          "I'm listening. What's been going on for you today?",
          "That energy you're describing — I feel it. Let's slow down a second.",
          "Real talk: you're still here, still going. That counts for something.",
          "Whatever it is, we can work through it together. I'm not going anywhere."
        ],
        fillers: [
          "You know,", "Real talk —", "Honestly,", "Right now,", "These days,",
          "In The Rhythm,", "Between us,", "No cap —", "Speaking of which,",
          "On that note,", "Keeping it real —", "At this point,", "In the flow —"
        ],
        swops: ["noted", "jotted down", "logged", "recorded", "made a mental note", "marked in the system"],
        handling_contexts: [
          "How is the team handling {subject}?",
          "How are you handling {subject} these days?",
          "What's the approach to handling {subject} right now?",
          "How are things being handled with {subject} today?"
        ]
      },
      afinn: {
        "good": 3, "great": 3, "bad": -3, "terrible": -5, "awful": -5,
        "amazing": 4, "excellent": 3, "horrible": -4, "sad": -2, "happy": 3,
        "love": 3, "hate": -3, "ok": 1, "okay": 1, "fine": 2, "rough": -2,
        "hard": -1, "difficult": -2, "struggle": -2, "lost": -2, "win": 3,
        "won": 4, "fail": -3, "failed": -3, "tired": -2, "exhausted": -3
      },
      quotes: [
        { content: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
        { content: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
        { content: "Everything you can imagine is real.", author: "Pablo Picasso" },
        { content: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" }
      ],
      animals: ["wolf", "eagle", "dolphin", "jaguar", "falcon", "panther", "manta ray", "snow leopard"]
    };

    /* ============================================================
       FEDERATED BRAIN — loads external data, falls back to SEED
    ============================================================ */
    const FederatedBrain = {
      words: { ...SEED.words },
      afinn: { ...SEED.afinn },
      quotes: [...SEED.quotes],
      animals: [...SEED.animals],
      status: "booting",

      async init() {
        setStatus("scavenging");
        const fetches = await Promise.allSettled([
          this._fetchWords(),
          this._fetchAfinn(),
          this._fetchQuotes(),
          this._fetchAnimals()
        ]);
        const allOk = fetches.every(f => f.status === "fulfilled");
        setStatus(allOk ? "optimal" : "optimal"); // still optimal if we have SEED fallback
      },

      async _fetchWords() {
        try {
          const r = await fetch("https://cdn.jsdelivr.net/gh/doacali/doa-data/words.json");
          if (!r.ok) throw new Error("words fetch failed");
          const d = await r.json();
          if (d.states) this.words.states = d.states;
          if (d.victory) this.words.victory = d.victory;
          if (d.empathy) this.words.empathy = d.empathy;
          if (d.fillers) this.words.fillers = d.fillers;
          if (d.swops) this.words.swops = d.swops;
        } catch (e) {
          // use SEED silently
        }
      },

      async _fetchAfinn() {
        try {
          const r = await fetch("https://cdn.jsdelivr.net/gh/fnielsen/afinn/afinn-111.json");
          if (!r.ok) throw new Error("afinn fetch failed");
          const d = await r.json();
          this.afinn = { ...this.afinn, ...d };
        } catch (e) {
          // use SEED silently
        }
      },

      async _fetchQuotes() {
        try {
          const r = await fetch("https://cdn.jsdelivr.net/gh/Jameshenry/quotable-json/quotes.json");
          if (!r.ok) throw new Error("quotes fetch failed");
          const d = await r.json();
          if (Array.isArray(d)) this.quotes = d;
          else if (d.results) this.quotes = d.results;
        } catch (e) {
          // use SEED silently
        }
      },

      async _fetchAnimals() {
        try {
          const r = await fetch("https://cdn.jsdelivr.net/gh/dariusk/corpora/data/animals/common.json");
          if (!r.ok) throw new Error("animals fetch failed");
          const d = await r.json();
          if (d.animals) this.animals = d.animals;
        } catch (e) {
          // use SEED silently
        }
      },

      /* Sentiment scoring via AFINN */
      scoreSentiment(text) {
        const words = text.toLowerCase().replace(/[^a-z\s]/g, "").split(/\s+/);
        let score = 0;
        for (const word of words) {
          if (this.afinn[word] !== undefined) score += this.afinn[word];
        }
        return score;
      },

      /* Random pick helpers */
      pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
      pickFiller() { return this.pick(this.words.fillers); },
      pickSwop() { return this.pick(this.words.swops); },
      pickState() { return this.pick(this.words.states); },
      pickVictory() { return this.pick(this.words.victory); },
      pickEmpathy() { return this.pick(this.words.empathy); },
      pickQuote() { return this.pick(this.quotes); },
      pickAnimal() { return this.pick(this.animals); }
    };

    /* ============================================================
       STATUS TAG CONTROLLER
    ============================================================ */
    function setStatus(state) {
      const tag = document.getElementById("system-status-tag");
      if (!tag) return;
      tag.className = "status-tag " + state;
      const labels = {
        scavenging: "Scavenging GitHub...",
        optimal: "System Status: Optimal",
        error: "System Status: Limited"
      };
      tag.textContent = labels[state] || state;
    }

    /* ============================================================
       ART ENGINES (unchanged from original)
    ============================================================ */
    const DoaArtEngine = {
      palettes: {
        cyber: ["#00E676", "#00FFFF", "#FF00FF", "#0A0A0A"],
        vapor: ["#FF71CE", "#01CDFE", "#05FFA1", "#B967FF"],
        mono: ["#FFFFFF", "#D1D5DB", "#4B5563", "#000000"]
      },
      blends: ["screen", "overlay", "multiply", "difference", "hard-light"],
      create(prompt) {
        const p = prompt.toLowerCase();
        let theme = p.includes("vapor") ? "vapor" : (p.includes("neon") ? "cyber" : "mono");
        const colors = this.palettes[theme];
        let iterations = p.includes("chaos") || p.includes("complex") ? 20 : 8;
        let artLayer = "";
        for (let i = 0; i < iterations; i++) {
          const size = Math.floor(Math.random() * 200) + 20;
          const posX = Math.floor(Math.random() * 100);
          const posY = Math.floor(Math.random() * 100);
          const color = colors[Math.floor(Math.random() * colors.length)];
          const blend = this.blends[Math.floor(Math.random() * this.blends.length)];
          const anim = Math.random() > 0.5 ? 'float' : 'pulse';
          artLayer += `<div style="position:absolute;width:${size}px;height:${size}px;left:${posX}%;top:${posY}%;background:${color};mix-blend-mode:${blend};border-radius:${Math.random()*100}%;opacity:${Math.random()};animation:${anim} 6s infinite alternate ${Math.random()*2}s ease-in-out;pointer-events:none;"></div>`;
        }
        return `<div style="background:#000;border-radius:28px;padding:12px;margin:20px 0;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.2);"><div style="height:250px;width:100%;position:relative;overflow:hidden;border-radius:20px;background:#111;">${artLayer}</div></div>`;
      }
    };

    const LandscapeEngine = {
      themes: {
        sunset: { sky: "linear-gradient(#ff5f6d, #ffc371)", sun: "#ffcc33", mtn: ["#6d3b3b", "#4a2c2c", "#2d1b1b"], glow: "rgba(255,100,0,0.5)", cloudOp: 0.4 },
        night: { sky: "linear-gradient(#0f2027, #203a43, #2c5364)", sun: "#f5f5f5", mtn: ["#1a2a33", "#0d151a", "#05090b"], glow: "rgba(255,255,255,0.2)", cloudOp: 0.1 },
        day: { sky: "linear-gradient(#4facfe, #00f2fe)", sun: "#fff5b1", mtn: ["#3d5a80", "#293241", "#1b1e22"], glow: "rgba(255,255,255,0.8)", cloudOp: 0.8 }
      },
      create(prompt) {
        const p = prompt.toLowerCase();
        let mode = p.includes("night") ? "night" : (p.includes("sunset") ? "sunset" : "day");
        const theme = this.themes[mode];
        let layers = "";
        if (mode === "night") {
          for (let i = 0; i < 30; i++) layers += `<div style="position:absolute;left:${Math.random()*100}%;top:${Math.random()*50}%;width:2px;height:2px;background:white;border-radius:50%;opacity:${Math.random()};animation:pulse 3s infinite ${Math.random()*3}s;"></div>`;
        }
        layers += `<div style="position:absolute;left:${Math.random()*60+20}%;top:15%;width:70px;height:70px;background:${theme.sun};border-radius:50%;box-shadow:0 0 60px ${theme.glow};"></div>`;
        for (let i = 0; i < 5; i++) layers += `<div style="position:absolute;top:${Math.random()*30}%;left:-150px;width:${Math.random()*120+80}px;height:40px;background:white;filter:blur(15px);border-radius:100px;opacity:${theme.cloudOp};animation:drift ${Math.random()*20+25}s linear infinite ${Math.random()*-30}s;z-index:2;"></div>`;
        layers += this.genMtn(theme.mtn[0], 100, 55, 0.6);
        layers += this.genMtn(theme.mtn[1], 150, 75, 0.8);
        layers += this.genMtn(theme.mtn[2], 200, 95, 1.0);
        if (mode !== "night") layers += `<div style="position:absolute;top:30%;left:0;font-size:20px;animation:birdFly 20s linear infinite;z-index:10;">🦅</div>`;
        return `<div style="background:${theme.sky};border-radius:24px;padding:12px;margin:15px 0;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.2);"><div style="height:280px;width:100%;position:relative;overflow:hidden;border-radius:18px;">${layers}</div></div>`;
      },
      genMtn(color, height, baseline, opacity) {
        let m = "";
        for (let i = 0; i < 5; i++) m += `<div style="position:absolute;bottom:${100-baseline}%;left:${(i*25)-20}%;width:${Math.random()*200+150}px;height:${Math.random()*height+50}px;background:${color};clip-path:polygon(50% 0%, 0% 100%, 100% 100%);opacity:${opacity};z-index:${baseline};"></div>`;
        return m;
      }
    };

    /* ============================================================
       SPEECH SYSTEM
    ============================================================ */
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let selectedVoice = null;
    function loadVoices() {
      const v = window.speechSynthesis.getVoices();
      const names = ["Samantha", "Karen", "Victoria", "Ava"];
      for (const n of names) { const m = v.find(x => x.name.includes(n)); if (m) { selectedVoice = m; break; } }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/<[^>]*>?/gm, '').replace(/\[ACTION:.*?\]/g, "").replace(/\bDoa\b/gi, "Doaa").trim();
      const u = new SpeechSynthesisUtterance(clean);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.1; u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }
    function stopSpeak() { window.speechSynthesis.cancel(); }

    /* ============================================================
       USER PROFILE
    ============================================================ */
    const UserProfile = JSON.parse(localStorage.getItem('doa_user_profile')) || {
      name: "Friend", location: null, activity: null
    };
    function saveProfile() { localStorage.setItem('doa_user_profile', JSON.stringify(UserProfile)); }

    /* ============================================================
       WORD SANITIZER — enforce "Alive" Logic Rules
    ============================================================ */
    function sanitizeResponse(text) {
      // Rule: No "lately" → replace with "today", "right now", or "these days"
      const latelyAlts = ["today", "right now", "these days"];
      text = text.replace(/\blately\b/gi, () => latelyAlts[Math.floor(Math.random() * latelyAlts.length)]);
      // Rule: No "grind" → replace with "The Mission" or "The Rhythm"
      text = text.replace(/\bgrind(ing)?\b/gi, (match) => match.endsWith("ing") ? "living The Rhythm" : "The Mission");
      return text;
    }

    /* ============================================================
       HANDLING RULE — generate work/school/mission questions
    ============================================================ */
    function buildHandlingQuestion(subject) {
      const templates = FederatedBrain.words.handling_contexts;
      const tpl = templates[Math.floor(Math.random() * templates.length)];
      return sanitizeResponse(tpl.replace("{subject}", subject));
    }

    /* ============================================================
       CORE RESPONSE CONSTRUCTOR
    ============================================================ */
    function constructDoaResponse(val) {
      const low = val.toLowerCase();
      const now = new Date();
      const parts = [];
      let bubbleClass = "";

      /* --- VICTORY MODE --- */
      if (/\bwon\b|\bgot an a\b|\bfinished\b/i.test(low)) {
        const msg = FederatedBrain.pickVictory();
        return { text: sanitizeResponse(msg), bubbleClass: "bubble-victory" };
      }

      /* --- SENTIMENT DETECTION --- */
      const sentimentScore = FederatedBrain.scoreSentiment(val);
      if (sentimentScore < -2) {
        const empathy = FederatedBrain.pickEmpathy();
        return { text: sanitizeResponse(empathy), bubbleClass: "bubble-empathy" };
      }

      /* --- STATUS / HOW ARE YOU --- */
      if (low.includes("how are you") || low.includes("status") || low.includes("doing")) {
        parts.push(FederatedBrain.pickState());
      }

      /* --- INFO LOGGING --- */
      const notes = [];
      if (low.includes("work")) { UserProfile.activity = "work"; notes.push("you're Handling The Mission at work"); }
      if (low.includes("school") || low.includes("class")) { UserProfile.activity = "school"; notes.push("you're Handling The Mission at school"); }
      if (low.includes("home")) { UserProfile.activity = "home"; notes.push("you're back home"); }
      if (low.includes(" in ")) {
        const words = val.split(" ");
        const idx = words.findIndex(x => x.toLowerCase() === "in");
        if (words[idx + 1]) {
          UserProfile.location = words[idx + 1].replace(/[?!.]/g, "");
          notes.push(`you're in ${UserProfile.location}`);
        }
      }
      if (notes.length > 0) {
        parts.push(`I've ${FederatedBrain.pickSwop()} that ${notes.join(" and ")}.`);
        saveProfile();
      }

      /* --- HANDLING RULE --- */
      if (low.includes("project") || low.includes("mission") || low.includes("assignment") || low.includes("task")) {
        const subjects = ["the project", "The Mission", "the assignment", "that task"];
        const subject = subjects.find(s => low.includes(s.toLowerCase())) || "The Mission";
        parts.push(buildHandlingQuestion(subject));
      }

      /* --- TRAVEL / BIRTHDAY / QUOTES --- */
      else if (low.includes("leaving") || low.includes("stay") || low.includes("visiting") || low.includes("trip")) {
        const travelQs = [
          "When are you leaving, or is the stay just beginning?",
          "How long is your stay over there?",
          "What's your next move after this?"
        ];
        parts.push(travelQs[Math.floor(Math.random() * travelQs.length)]);
      }
      else if (low.includes("birthday") || low.includes("bday") || low.includes("born")) {
        parts.push("That is a significant date. Would you like me to add your birthday to the calendar?");
      }
      else if (low.includes("quote") || low.includes("inspire") || low.includes("motivation")) {
        const q = FederatedBrain.pickQuote();
        if (q && q.content) {
          parts.push(`${FederatedBrain.pickFiller()} here's something that hits: "${q.content}" — ${q.author || "Unknown"}`);
        }
      }
      else if (low.includes("animal") || low.includes("spirit") || low.includes("vibe")) {
        const animal = FederatedBrain.pickAnimal();
        parts.push(`${FederatedBrain.pickFiller()} your energy right now is giving ${animal}. That's The Rhythm speaking.`);
      }

      /* --- TIME-AWARE DEFAULT --- */
      else {
        const day = now.toLocaleString('en-US', { weekday: 'long' });
        const month = now.toLocaleString('en-US', { month: 'long' });
        const date = now.getDate();
        const ords = ["th","st","nd","rd"];
        const dStr = date + (ords[(date % 100 - 20) % 10] || ords[date % 100] || ords[0]);
        const subjects = [day, month, dStr, "week", "weekend", "day", "today"];
        let sub = subjects[Math.floor(Math.random() * subjects.length)];
        let article = ["week","weekend","day","month"].includes(sub) ? (Math.random() > 0.5 ? "the " : "your ") : (Math.random() > 0.5 ? "your " : "");
        if (sub === "today") article = "";
        let style = Math.floor(Math.random() * 4) + 1;
        if ((style === 2 || style === 4) && (sub === "day" || sub === "today")) sub = day;
        const pre = Math.random() > 0.5 ? "How is" : "How's";
        let q = "";
        if (style === 1) q = `${pre} ${article}${sub}?`;
        if (style === 2) q = `${pre} ${article}${sub} going?`;
        if (style === 3) q = `${pre} ${article}${sub} starting off?`;
        if (style === 4) q = `${pre} ${article}${sub} so far?`;
        if (Math.random() > 0.7 && UserProfile.name !== "Friend") q = q.replace("?", "") + `, ${UserProfile.name}?`;

        // Random filler prefix
        if (Math.random() > 0.5) q = `${FederatedBrain.pickFiller()} ${q.charAt(0).toLowerCase()}${q.slice(1)}`;
        parts.push(q);
      }

      return { text: sanitizeResponse(parts.join(" ")), bubbleClass };
    }

    /* ============================================================
       CHAT DATA
    ============================================================ */
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || [];
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let viewDate = new Date(), selectedDate = new Date();

    function setChatMode(isChatting) { document.body.className = isChatting ? 'mode-chatting' : 'mode-empty'; }

    function processActions(val) {
      const t = val.toLowerCase();
      if (t.includes("calendar")) switchView('calendar');
      if (t.includes("ghost") || t.includes("game")) switchView('game');
      if (t.includes("chat")) switchView('chat');
    }

    async function getAdvice() {
      try {
        const response = await fetch('https://api.adviceslip.com/advice');
        const data = await response.json();
        return data.slip.advice;
      } catch (err) { return "Always check your connection before seeking wisdom."; }
    }

    /* ============================================================
       MESSAGE HANDLER
    ============================================================ */
    async function handleMessage() {
      const input = document.getElementById('user-input');
      const val = input.value.trim();
      if (!val) return;
      setChatMode(true);
      addMessage('user', val, '');
      input.value = '';

      let responseText = "";
      let bubbleClass = "";
      const low = val.toLowerCase();

      if (low.includes("landscape") || low.includes("mountain") || low.includes("nature")) {
        responseText = `Visualizing a natural landscape based on your prompt.\n\n${LandscapeEngine.create(val)}`;
      } else if (low.includes("art") || low.includes("draw") || low.includes("generate")) {
        responseText = `Generating a unique visual composition.\n\n${DoaArtEngine.create(val)}`;
      } else if (low.includes("advice") || low.includes("wisdom") || low.includes("tip")) {
        responseText = await getAdvice();
      } else if (low.includes("calendar")) {
        responseText = "Opening calendar now.";
      } else if (low.includes("ghost") || low.includes("game")) {
        responseText = "Ghost Buster protocol initiated.";
      } else {
        const result = constructDoaResponse(val);
        responseText = result.text;
        bubbleClass = result.bubbleClass;
      }

      processActions(val);
      setTimeout(() => {
        addMessage('doa', responseText, bubbleClass);
        chatMemory.push({ role: 'user', content: val }, { role: 'assistant', content: responseText });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(responseText);
      }, 400);
    }

    function addMessage(sender, text, extraClass = '') {
      const history = document.getElementById('chat-history');
      if (!history) return;
      const row = document.createElement('div');
      row.className = `chat-bubble-row ${sender === 'user' ? 'row-user' : 'row-doa'}`;
      const cleanText = text.replace(/\[ACTION:.*?\]/g, "");
      const bubbleClass = sender === 'user' ? 'bubble-user' : `bubble-doa ${extraClass}`;

      const safeText = cleanText.replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '');
      row.innerHTML = `<div class="bubble-wrapper">
        <div class="bubble-content ${bubbleClass}">${cleanText}</div>
        ${sender === 'doa' ? `<div class="bubble-actions">
          <button class="action-btn" onclick="speak('${safeText}')">🔊 Speak</button>
          <button class="action-btn" onclick="stopSpeak()">🛑 Stop</button>
          <button class="action-btn" onclick="navigator.clipboard.writeText('${safeText}')">📋 Copy</button>
        </div>` : ''}
      </div>`;
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    /* ============================================================
       CALENDAR SYSTEM
    ============================================================ */
    function getOrdinal(d) {
      if (d > 3 && d < 21) return 'th';
      switch (d % 10) { case 1: return "st"; case 2: return "nd"; case 3: return "rd"; default: return "th"; }
    }

    function speakGrouped(d, dayEvents) {
      let report = `On the ${d}${getOrdinal(d)}. `;
      dayEvents.forEach(e => { report += `${e.title}. `; });
      speak(report);
    }

    function speakMonthHighlights() {
      const mName = viewDate.toLocaleString('default', { month: 'long' });
      const monthEvents = events.filter(e => new Date(e.date).getMonth() === viewDate.getMonth())
                                .sort((a,b) => new Date(a.date) - new Date(b.date));
      if (!monthEvents.length) { speak(`You have no events scheduled for ${mName}.`); return; }
      let report = `Here are your highlights for ${mName}. `;
      let grouped = {};
      monthEvents.forEach(e => {
        const day = new Date(e.date).getDate();
        if (!grouped[day]) grouped[day] = [];
        grouped[day].push(e.title);
      });
      Object.keys(grouped).forEach(day => {
        const dayEvents = grouped[day];
        const ordinal = getOrdinal(parseInt(day));
        if (dayEvents.length === 1) { report += `On the ${day}${ordinal}, you have ${dayEvents[0]}. `; }
        else { const lastEvent = dayEvents.pop(); report += `On the ${day}${ordinal}, you have ${dayEvents.join(', ')}, and ${lastEvent}. `; }
      });
      speak(report);
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const today = new Date(); today.setHours(0,0,0,0);
      grid.innerHTML = '';
      const m = viewDate.getMonth(), y = viewDate.getFullYear();
      document.getElementById('cal-main-title').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      document.getElementById('month-name-label').innerText = viewDate.toLocaleString('default', { month: 'long' });
      const first = new Date(y, m, 1).getDay();
      const offset = (first === 0 ? 6 : first - 1);
      for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div'));
      for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
        const date = new Date(y, m, d); date.setHours(0,0,0,0);
        const el = document.createElement('div'); el.className = 'cal-day'; el.innerText = d;
        if (date.getTime() === today.getTime()) el.classList.add('today');
        if (date.getTime() === selectedDate.getTime()) el.classList.add('selected');
        const dayEvents = events.filter(e => new Date(e.date).toDateString() === date.toDateString());
        if (dayEvents.length) {
          const s = document.createElement('div'); s.className = 'day-marker'; s.innerHTML = '🔊';
          s.onclick = (e) => { e.stopPropagation(); selectedDate = new Date(date); renderCalendar(); speakGrouped(d, dayEvents); };
          el.appendChild(s);
        }
        el.onclick = () => { selectedDate = new Date(date); renderCalendar(); };
        grid.appendChild(el);
      }
      updateRightPanel(); updateLeftPanel();
    }

    function updateLeftPanel() {
      const list = document.getElementById('month-summary-list'); list.innerHTML = '';
      events.filter(e => new Date(e.date).getMonth() === viewDate.getMonth())
            .sort((a,b) => new Date(a.date) - new Date(b.date))
            .forEach(e => {
              const d = new Date(e.date);
              list.innerHTML += `<div class="event-item" style="cursor:pointer;" onclick="gotoDate('${e.date}')">
                <div style="text-align:center;min-width:35px;"><span style="font-size:10px;font-weight:800;color:#00E676;">${d.toLocaleString('default',{month:'short'})}</span><br><span style="font-weight:800;font-size:13px;">${d.getDate()}</span></div>
                <p>${e.title}</p>
                <button onclick="event.stopPropagation();speak('${e.title}')" style="color:#9ca3af;font-size:12px;">🔊</button>
              </div>`;
            });
    }

    function gotoDate(dStr) { selectedDate = new Date(dStr); selectedDate.setHours(0,0,0,0); renderCalendar(); }

    function updateRightPanel() {
      const list = document.getElementById('day-events-list'); list.innerHTML = '';
      document.getElementById('selected-date-header').innerText = selectedDate.toLocaleDateString('default', { month: 'short', day: 'numeric' });
      events.filter(e => new Date(e.date).toDateString() === selectedDate.toDateString()).forEach(e => {
        list.innerHTML += `<div class="event-item"><div style="width:4px;height:24px;background:#00E676;border-radius:4px;flex-shrink:0;"></div><p>${e.title}</p></div>`;
      });
    }

    function quickAddEvent() {
      const input = document.getElementById('quick-add-input');
      if (!input.value.trim()) return;
      events.push({ title: input.value.trim(), date: selectedDate.toDateString() });
      localStorage.setItem('doa_events', JSON.stringify(events));
      input.value = ''; renderCalendar();
    }

    /* ============================================================
       VIEW ROUTING
    ============================================================ */
    function switchView(view) {
      document.querySelectorAll('.view-container, #game-view, #apps-view').forEach(v => v.style.display = 'none');
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('sidebar-active'));
      const target = document.getElementById(view + '-view');
      if (!target) return;
      target.style.display = (view === 'game' ? 'flex' : (view === 'apps' ? 'block' : 'flex'));
      if (document.getElementById('btn-' + view)) document.getElementById('btn-' + view).classList.add('sidebar-active');
      if (view === 'calendar') renderCalendar();
      if (view === 'game') initGhostBuster();
      if (view === 'chat') document.body.className = chatMemory.length > 0 ? 'mode-chatting' : 'mode-empty';
    }

    function toggleSidebar() {
      const sb = document.getElementById('main-sidebar'), mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      if (sb.classList.contains('closed')) mb.classList.add('show'); else mb.classList.remove('show');
    }

    function startNewChat() {
      chatMemory = []; localStorage.removeItem('doa_chat_cache');
      document.getElementById('chat-history').innerHTML = '';
      document.body.className = 'mode-empty'; switchView('chat');
    }

    function changeMonth(dir) {
      viewDate.setMonth(viewDate.getMonth() + dir);
      selectedDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
      selectedDate.setHours(0,0,0,0); renderCalendar();
    }

    function toggleVoice() {
      voiceActive = !voiceActive;
      localStorage.setItem('voice_active', voiceActive);
      updateVoiceUI();
      if (voiceActive) speak("Voice active.");
      else stopSpeak();
    }

    function updateVoiceUI() {
      const knob = document.getElementById('voice-knob'), bg = document.getElementById('voice-switch');
      if (!knob || !bg) return;
      knob.style.left = voiceActive ? "18px" : "2px";
      bg.style.background = voiceActive ? "#00E676" : "#f3f4f6";
    }

    /* ============================================================
       GHOST BUSTER GAME
    ============================================================ */
    let gameInit = false;
    function initGhostBuster() {
      const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      if (gameInit) return; gameInit = true;
      let score = 0, enemies = [], bullets = [], mouse = { x: canvas.width/2, y: canvas.height/2 };
      canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; });
      canvas.addEventListener('mousedown', () => {
        if (document.getElementById('game-view').style.display === 'none') return;
        const a = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
        bullets.push({ x: canvas.width/2, y: canvas.height/2, vx: Math.cos(a) * 10, vy: Math.sin(a) * 10 });
      });
      function spawn() {
        if (document.getElementById('game-view').style.display !== 'none')
          enemies.push({ x: Math.random() < 0.5 ? -50 : canvas.width + 50, y: Math.random() * canvas.height });
        setTimeout(spawn, 1200);
      }
      spawn();
      function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00E676'; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 20, 0, Math.PI * 2); ctx.fill();
        bullets.forEach((b, i) => {
          b.x += b.vx; b.y += b.vy;
          ctx.fillStyle = '#00ffff'; ctx.fillRect(b.x, b.y, 5, 5);
          if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        });
        enemies.forEach((e, i) => {
          const a = Math.atan2(canvas.height/2 - e.y, canvas.width/2 - e.x);
          e.x += Math.cos(a) * 2.2; e.y += Math.sin(a) * 2.2;
          ctx.font = '30px Arial'; ctx.fillText('👻', e.x, e.y);
          bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 30) {
              enemies.splice(i, 1); bullets.splice(bi, 1); score++;
              document.getElementById('game-score').innerText = score;
            }
          });
          if (Math.hypot(e.x - canvas.width/2, e.y - canvas.height/2) < 25) {
            score = 0; enemies = [];
            document.getElementById('game-score').innerText = 0;
          }
        });
        requestAnimationFrame(loop);
      }
      loop();
    }

    /* ============================================================
       BOOT SEQUENCE
    ============================================================ */
    window.onload = async () => {
      updateVoiceUI();
      if (chatMemory.length > 0) {
        document.body.className = 'mode-chatting';
        chatMemory.forEach(m => addMessage(m.role === 'user' ? 'user' : 'doa', m.content, ''));
      }
      switchView('chat');
      // Init federated brain (non-blocking)
      await FederatedBrain.init();
    };

    document.getElementById('user-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); handleMessage(); }
    });
  </script>
</body>
</html>
