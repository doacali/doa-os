<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, ::before, ::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; display: flex; overflow: hidden; }
    
    /* Layout */
    #main-sidebar { width: 260px; border-right: 1px solid #f3f4f6; display: flex; flex-direction: column; background: white; z-index: 100; transition: 0.3s; }
    #main-sidebar.closed { margin-left: -260px; }
    main { flex: 1; display: flex; flex-direction: column; position: relative; }
    
    .sidebar-item { padding: 12px; cursor: pointer; border-radius: 12px; font-weight: 700; color: #9ca3af; margin: 0 16px 4px 16px; text-align: left; }
    .sidebar-active { background: #111 !important; color: #fff !important; }
    
    /* Views */
    .view-container { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; }
    #chat-view { display: flex; } /* Start with chat visible */
    
    #chat-shell { width: 100%; max-width: 48rem; height: 100%; display: flex; flex-direction: column; padding: 20px; }
    #chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .chat-bubble-row { display: flex; width: 100%; }
    .bubble-content { padding: 16px; border-radius: 20px; font-size: 14px; max-width: 80%; }
    .row-user { justify-content: flex-end; } .bubble-user { background: #000; color: #fff; }
    .row-doa { justify-content: flex-start; } .bubble-doa { background: #f3f4f6; }
    
    .input-box { width: 100%; padding: 20px; display: flex; gap: 10px; }
    input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 30px; }
  </style>
</head>
<body>

  <aside id="main-sidebar">
    <h1 style="color: #00E676; padding: 24px; font-weight: 900;">DOA CALI</h1>
    <button onclick="startNewChat()" class="sidebar-item" style="border:1px solid #eee;">+ New Chat</button>
    <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
    <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
    <button onclick="switchView('game')" id="btn-game" class="sidebar-item">👻 Ghost Buster</button>
  </aside>

  <main>
    <div id="chat-view" class="view-container">
        <div id="chat-history"></div>
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Ask Doa anything...">
            <button onclick="handleMessage()" style="padding:10px 20px; background:#000; color:#fff; border-radius:20px;">Send</button>
        </div>
    </div>
    <div id="calendar-view" class="view-container"><h1>Calendar</h1></div>
    <div id="game-view" class="view-container" style="background:#000;"><canvas id="game-canvas"></canvas></div>
  </main>

  <script>
    /* --- LOGIC --- */
    function switchView(view) {
        document.querySelectorAll('.view-container').forEach(v => v.style.display = 'none');
        document.getElementById(view + '-view').style.display = 'flex';
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('sidebar-active'));
        document.getElementById('btn-' + view).classList.add('sidebar-active');
        if (view === 'game') initGhostBuster();
    }

    function addMessage(sender, text) {
        const h = document.getElementById('chat-history');
        const row = document.createElement('div');
        row.className = `chat-bubble-row row-${sender}`;
        row.innerHTML = `<div class="bubble-content bubble-${sender}">${text}</div>`;
        h.appendChild(row);
        h.scrollTop = h.scrollHeight;
    }

    function handleMessage() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        addMessage('user', input.value);
        const val = input.value;
        input.value = "";
        // Simple brain logic
        setTimeout(() => addMessage('doa', `I'm feeling pretty steady honestly. How is the mission unfolding for you?`), 400);
    }

    function initGhostBuster() {
        const c = document.getElementById('game-canvas'), ctx = c.getContext('2d');
        c.width = 600; c.height = 400;
        let x = 0;
        function draw() { ctx.clearRect(0,0,c.width,c.height); ctx.font="40px Arial"; ctx.fillText("👻", x, 200); x+=2; if(x>c.width) x=-40; requestAnimationFrame(draw); }
        draw();
    }
    
    document.getElementById('user-input').addEventListener('keydown', (e) => { if(e.key==='Enter') handleMessage(); });
  </script>
</body>
</html>
