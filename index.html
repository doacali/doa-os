<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AI Local Knowledge</title>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <!-- Chat Widget -->
    <div id="chat-modal" class="bg-white w-[500px] h-[600px] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-200">
        <div class="p-4 bg-gray-50 border-b font-bold flex justify-between">
            <span>Animal Knowledge Base</span>
            <span id="status" class="text-xs text-green-500">System Ready</span>
        </div>
        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-3">
            <div class="text-gray-400 italic">Ask about an animal (e.g., "Capybara")...</div>
        </div>
        <div class="p-4 border-t">
            <input id="user-input" type="text" placeholder="Type here..." class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
    </div>

    <script>
        // 1. Setup IndexedDB
        let db;
        const request = indexedDB.open("AnimalStore", 1);
        request.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("animals"); };
        request.onsuccess = (e) => { db = e.target.result; };

        // 2. Fetch from GitHub Repo
        async function syncGitHubData() {
            document.getElementById('status').innerText = "Syncing...";
            const response = await fetch("https://raw.githubusercontent.com/josh-geller/animals/main/animals.json");
            const data = await response.json();
            const tx = db.transaction("animals", "readwrite");
            tx.objectStore("animals").put(data, "list");
            document.getElementById('status').innerText = "Synced with GitHub";
        }

        // 3. Handle Chat
        document.getElementById('user-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.toLowerCase();
                const chat = document.getElementById('chat-window');
                chat.innerHTML += `<div><b>You:</b> ${query}</div>`;
                e.target.value = "";

                // Query IndexedDB
                const tx = db.transaction("animals", "readonly");
                const data = await new Promise(res => {
                    const req = tx.objectStore("animals").get("list");
                    req.onsuccess = () => res(req.result);
                });

                if (!data) {
                    await syncGitHubData();
                    chat.innerHTML += `<div><i>Data loaded. Please ask again.</i></div>`;
                } else {
                    const animal = data.find(a => a.name.toLowerCase() === query);
                    chat.innerHTML += `<div><b>AI:</b> ${animal ? animal.description : "Not found in local memory."}</div>`;
                }
            }
        });

        // Initial trigger
        setTimeout(syncGitHubData, 1000);
    </script>
</body>
</html>
