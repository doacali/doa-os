<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Add your original CSS styles here - the look stays the same! */
    body { margin: 0; background: #ffffff; color: #111827; height: 100vh; width: 100vw; overflow: hidden; display: flex; font-family: 'Plus Jakarta Sans', sans-serif; }
    #main-sidebar { width: 260px; border-right: 1px solid #f3f4f6; display: flex; flex-direction: column; }
    main { flex: 1; display: flex; flex-direction: column; padding: 20px; }
    .chat-bubble-row { display: flex; margin-bottom: 20px; }
    .bubble-content { padding: 16px; border-radius: 20px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .row-user { justify-content: flex-end; }
    .bubble-user { background: #000; color: #fff; }
    .row-doa { justify-content: flex-start; }
    .bubble-doa { background: #f3f4f6; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="main-sidebar">
    <h1 style="color: #00E676; padding: 20px;">DOA CALI</h1>
    <button onclick="startNewChat()">+ New Chat</button>
  </aside>

  <!-- Main Chat -->
  <main>
    <div id="chat-history" style="flex:1; overflow-y:auto;"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="user-input" placeholder="Talk to me..." style="flex:1; padding:10px; border:1px solid #ccc; border-radius:20px;">
        <button onclick="handleMessage()">Send</button>
    </div>
  </main>

  <script>
    /* --- 1. THE BRAIN (Pollination & Storage) --- */
    let DoaBrain = {
        fillers: ["honestly", "truth be told", "overall"],
        victory_words: ["Brilliant", "Spectacular", "Awesome", "Great"],
        personal_states: ["steady", "balanced", "centered", "vibrant"],
        system_states: ["exponentially good", "operational", "flowing nicely"],
        modules: {
            empathy: { reactions: ["I'm so sorry."], check_ins: ["Are you holding up okay?"] },
            finance: { nouns: ["the bag", "the empire"], verbs: ["scaling", "securing"] }
        }
    };

    // This fetches your words.json from GitHub (jsDelivr)
    async function pollinate() {
        try {
            const res = await fetch("https://cdn.jsdelivr.net/gh/doacali/doa-data/words.json");
            if (res.ok) DoaBrain = await res.json();
            console.log("Brain Synchronized.");
        } catch (e) { console.log("Using local seed."); }
    }

    /* --- 2. LOGIC ENGINE --- */
    function constructResponse(val) {
        const low = val.toLowerCase();
        const b = DoaBrain;
        const f = b.fillers[Math.floor(Math.random() * b.fillers.length)];

        // Victory Logic
        if (low.includes("got an a") || low.includes("won") || low.includes("amazing")) {
            return `${b.victory_words[0]}! That's great to hear. I'm feeling pretty vibrant hearing that!`;
        }

        // Empathy Logic
        if (low.includes("bad") || low.includes("not okay")) {
            return b.modules.empathy.reactions[0] + " " + b.modules.empathy.check_ins[0];
        }

        // Default
        return `I'm feeling pretty ${b.personal_states[0]} ${f}. How is the mission unfolding today?`;
    }

    /* --- 3. SYSTEM CORE --- */
    function handleMessage() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;
        
        // Add User Message
        const row = document.createElement('div');
        row.className = 'chat-bubble-row row-user';
        row.innerHTML = `<div class="bubble-content bubble-user">${val}</div>`;
        document.getElementById('chat-history').appendChild(row);
        input.value = "";

        // Add Doa Response
        setTimeout(() => {
            const res = constructResponse(val);
            const r2 = document.createElement('div');
            r2.className = 'chat-bubble-row row-doa';
            r2.innerHTML = `<div class="bubble-content bubble-doa">${res}</div>`;
            document.getElementById('chat-history').appendChild(r2);
        }, 500);
    }

    window.onload = pollinate;
  </script>
</body>
</html>
