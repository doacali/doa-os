<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa Cali | OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* --- MINIMALIST OS STYLING --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #111827; height: 100vh; display: flex; overflow: hidden; }
    
    /* Sidebar */
    aside { width: 260px; border-right: 1px solid #f3f4f6; padding: 24px; display: flex; flex-direction: column; }
    .logo { color: #00E676; font-weight: 900; font-style: italic; font-size: 20px; margin-bottom: 40px; }
    .nav-item { padding: 12px; font-weight: 700; color: #9ca3af; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; }
    .nav-item:hover { background: #f9fafb; color: #111; }
    .active { background: #111; color: #fff !important; }

    /* Main Chat Area */
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    #chat-container { width: 100%; max-width: 700px; height: 80vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    #chat-container::-webkit-scrollbar { display: none; }

    /* Bubbles */
    .bubble { max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 14px; line-height: 1.5; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .user { align-self: flex-end; background: #000; color: #fff; border-bottom-right-radius: 4px; }
    .doa { align-self: flex-start; background: #f3f4f6; color: #111; border-bottom-left-radius: 4px; }

    /* Input */
    .input-wrapper { width: 100%; max-width: 700px; padding: 20px; position: absolute; bottom: 20px; }
    .input-box { background: #fff; border: 1px solid #f3f4f6; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-radius: 32px; padding: 8px; display: flex; align-items: center; }
    input { flex: 1; padding: 10px 20px; border: none; outline: none; font-size: 14px; }
    .send-btn { background: #000; color: #fff; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  </style>
</head>
<body>

  <aside>
    <div class="logo">DOA CALI</div>
    <div class="nav-item active">💬 Chat</div>
    <div class="nav-item">📅 Calendar</div>
    <div class="nav-item">📱 Apps</div>
    <div style="margin-top: auto; font-size: 10px; color: #d1d5db; font-weight: 800;">OS ENGINE V4.0</div>
  </aside>

  <main>
    <div id="chat-container">
        <div class="bubble doa">System Online. Pulling from cloud memory...</div>
    </div>

    <div class="input-wrapper">
      <div class="input-box">
        <input type="text" id="user-input" placeholder="Ask Doa anything..." onkeydown="if(event.key==='Enter') handleSend()">
        <div class="send-btn" onclick="handleSend()">→</div>
      </div>
    </div>
  </main>

  <script>
    let DoaBrain = {};
    const DATA_URL = "https://cdn.jsdelivr.net/gh/doacali/doa-data/words.json";

    // 1. STALE-WHILE-REVALIDATE FETCH
    async function syncBrain() {
        const cached = localStorage.getItem('doa_cache');
        if (cached) {
            DoaBrain = JSON.parse(cached);
            console.log("Using cached brain.");
        }

        try {
            const res = await fetch(DATA_URL);
            const freshData = await res.json();
            DoaBrain = freshData;
            localStorage.setItem('doa_cache', JSON.stringify(freshData));
            addMessage("doa", "Cloud memory synchronized. I'm ready.");
        } catch (e) {
            console.log("Connection slow. Staying on local memory.");
        }
    }

    // 2. LOGIC ENGINE
    function constructResponse(val) {
        const low = val.toLowerCase();
        const b = DoaBrain;
        const f = b.fillers ? pick(b.fillers) : "honestly";
        
        // Sentiment Check
        if (low.includes("bad") || low.includes("not okay") || low.includes("lost")) {
            return pick(b.modules.empathy.reactions) + " " + pick(b.modules.empathy.check_ins);
        }

        // Module Check
        if (low.includes("money") || low.includes("finance")) {
            return `${f} how is ${pick(b.modules.finance.verbs)} ${pick(b.modules.finance.nouns)} going?`;
        }

        // Default
        return `${pick(b.intensity)} ${pick(b.modules.mindset.adjectives)} ${f}.`.trim();
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // 3. UI FUNCTIONS
    function addMessage(sender, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;

        addMessage("user", val);
        input.value = "";

        setTimeout(() => {
            const response = constructResponse(val);
            addMessage("doa", response);
        }, 500);
    }

    window.onload = syncBrain;
  </script>
</body>
</html>
