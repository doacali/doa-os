<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* ... (Keep your original CSS here exactly as it was) ... */
    body { margin: 0; background: #ffffff; color: #111827; height: 100vh; width: 100vw; overflow: hidden; display: flex; font-family: 'Plus Jakarta Sans', sans-serif; }
    #main-sidebar { width: 260px; border-right: 1px solid #f3f4f6; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .sidebar-item { padding: 12px; cursor: pointer; border-radius: 12px; font-weight: 700; color: #9ca3af; margin-bottom: 5px; }
    .sidebar-active { background: #111 !important; color: #fff !important; }
    .view-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
    #chat-view { display: flex; } /* Default */
    .input-box { width: 100%; max-width: 600px; display: flex; align-items: center; border: 1px solid #eee; border-radius: 30px; padding: 10px; }
    #user-input { flex: 1; padding: 10px; border: none; outline: none; }
    .send-btn { background: #000; color: #fff; width: 40px; height: 40px; border-radius: 50%; }
  </style>
</head>
<body>

  <aside id="main-sidebar">
    <h1 style="color: #00E676; font-weight: 900; padding: 20px;">DOA CALI</h1>
    <button onclick="startNewChat()" class="sidebar-item">+ New Chat</button>
    <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
    <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
    <button onclick="switchView('game')" id="btn-game" class="sidebar-item">👻 Ghost Buster</button>
  </aside>

  <main>
    <div id="chat-view" class="view-container">
        <div id="chat-history" style="flex:1; width:100%; max-width:600px; overflow-y:auto; padding:20px;"></div>
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Ask Doa anything...">
            <button class="send-btn" onclick="handleMessage()">→</button>
        </div>
    </div>
    <div id="calendar-view" class="view-container"><h1>Calendar</h1></div>
    <div id="game-view" class="view-container" style="background:#000;"><canvas id="game-canvas"></canvas></div>
  </main>

  <script>
    /* --- BRAIN SYNC --- */
    let DoaBrain = { fillers: ["honestly", "really"], personal_states: ["steady", "vibrant"], modules: { empathy: { reactions: ["I'm so sorry."], check_ins: ["You okay?"] } } };
    async function pollinate() {
        try {
            const res = await fetch("https://cdn.jsdelivr.net/gh/doacali/doa-data/words.json");
            if(res.ok) DoaBrain = await res.json();
        } catch(e) {}
    }

    /* --- LOGIC --- */
    function constructDoaResponse(val) {
        const low = val.toLowerCase();
        if(low.includes("bad")) return "I'm so sorry. Are you okay?";
        return `I'm feeling ${DoaBrain.personal_states[0]}. How's the mission?`;
    }

    /* --- UI NAVIGATION --- */
    function switchView(view) {
        document.querySelectorAll('.view-container').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('sidebar-active'));
        document.getElementById(view + '-view').style.display = 'flex';
        document.getElementById('btn-' + view).classList.add('sidebar-active');
        if (view === 'game') initGhostBuster();
    }

    function handleMessage() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;
        const h = document.getElementById('chat-history');
        h.innerHTML += `<div class="row-user" style="padding:10px; background:#000; color:#fff; margin:5px; border-radius:10px;">${val}</div>`;
        input.value = "";
        setTimeout(() => {
            h.innerHTML += `<div class="row-doa" style="padding:10px; background:#eee; margin:5px; border-radius:10px;">${constructDoaResponse(val)}</div>`;
        }, 500);
    }

    function initGhostBuster() { /* Add your ghost code here */ }
    function startNewChat() { location.reload(); }
    window.onload = pollinate;
    document.getElementById('user-input').addEventListener('keydown', (e) => { if(e.key==='Enter') handleMessage(); });
  </script>
</body>
</html>
